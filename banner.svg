<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#a78bfa;#ffffff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#ffffff;#a78bfa" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#a78bfa;#ffffff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
  </g>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="140" r="120" fill="#4f46e5" opacity="0.06">
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="140" r="100" fill="#7c3aed" opacity="0.06">
    <animate attributeName="opacity" values="0.06;0.10;0.06" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Top status bar -->
  <text x="32" y="32" font-family="'Courier New', monospace" font-size="11" fill="#4f46e5" opacity="0.8">
    > peter-jim / README.md
  </text>
  <circle cx="844" cy="26" r="5" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="856" y="30" font-family="'Courier New', monospace" font-size="10" fill="#22c55e" opacity="0.8">online</text>

  <!-- Divider line -->
  <line x1="32" y1="44" x2="868" y2="44" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>

  <!-- Main name -->
  <text x="450" y="128" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="72" font-weight="900" text-anchor="middle"
        fill="url(#nameGrad)" filter="url(#glow)" letter-spacing="12">
    兰斯 AI
  </text>

  <!-- Subtitle -->
  <text x="450" y="165" font-family="'Courier New', monospace"
        font-size="14" text-anchor="middle" fill="#6b7280" letter-spacing="4">
    INDEPENDENT DEVELOPER · AI BUILDER · VIBE CODER
  </text>

  <!-- Animated typing line -->
  <text x="450" y="204" font-family="'Courier New', monospace"
        font-size="13" text-anchor="middle" fill="#a78bfa" opacity="0">
    选择比努力重要 · 先干了再说
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom stats row -->
  <g transform="translate(0, 230)">
    <!-- Grant total -->
    <rect x="32" y="0" width="180" height="28" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="42" y="18" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">GRANTS RECEIVED</text>
    <text x="185" y="18" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa" text-anchor="end" font-weight="bold">$468K+</text>

    <!-- Projects -->
    <rect x="224" y="0" width="160" height="28" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="234" y="18" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">PRODUCTS SHIPPED</text>
    <text x="377" y="18" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa" text-anchor="end" font-weight="bold">4+</text>

    <!-- Current -->
    <rect x="396" y="0" width="200" height="28" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="406" y="18" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">BUILDING</text>
    <text x="589" y="18" font-family="'Courier New', monospace" font-size="11" fill="#22c55e" text-anchor="end">OpenClaw · Hetu</text>

    <!-- Location -->
    <rect x="608" y="0" width="160" height="28" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5"/>
    <text x="618" y="18" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">BASED IN</text>
    <text x="762" y="18" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa" text-anchor="end">Beijing 🇨🇳</text>

    <!-- Year -->
    <rect x="780" y="0" width="88" height="28" rx="4" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="0.5"/>
    <text x="824" y="18" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="bold">2026</text>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <polyline points="20,20 20,10 30,10" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <polyline points="880,20 880,10 870,10" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <polyline points="20,260 20,270 30,270" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <polyline points="880,260 880,270 870,270" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
  </g>
</svg>
